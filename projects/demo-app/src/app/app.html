<div style="padding: 40px">
  <h1>Skeleton Table Test</h1>

  <lib-skeleton-table
    [rows]="6"
    [columns]="5">
  </lib-skeleton-table>
</div>

<div style="padding: 40px">
  <h1>Skeleton Card Test</h1>

  <lib-skeleton-card
    [showImage]="true"
    [lines]="4">
  </lib-skeleton-card>
</div>

<div style="padding: 40px">
  <h1>Skeleton Chart Test</h1>

  <lib-skeleton-chart
    [type]="'pie'"
    [height]="300"
    [bars]="10">
  </lib-skeleton-chart>
</div>
<div style="padding: 40px">
  <h1>Skeleton Chart Test</h1>

  <lib-skeleton-chart
    [type]="'line'"
    [height]="300"
    [bars]="10">
  </lib-skeleton-chart>
</div>
<div style="padding: 40px">
  <h1>Skeleton Chart Test</h1>

  <lib-skeleton-chart
    [type]="'bar'"
    [height]="300"
    [bars]="10">
  </lib-skeleton-chart>
</div>

<div style="padding: 40px">
  <h1>Skeleton Avatar Test</h1>

  <lib-skeleton-avatar
    [size]="80"
    [shape]="'circle'">
  </lib-skeleton-avatar>

  <br/>
  <br/>

  <lib-skeleton-avatar
    [size]="80"
    [shape]="'square'">
  </lib-skeleton-avatar>

</div>

  <br/>
  <br/>

<div style="padding: 40px">
  <h1>Skeleton Text Test</h1>
  
  <lib-skeleton-text
    [lines]="4"
    [lineHeight]="16"
    [gap]="12"
    [lastLineWidth]="'80%'">
  </lib-skeleton-text>

</div>


  <br/>
  <br/>

<div style="padding: 40px">
  <h1>Skeleton Dashboard Test</h1>
  <lib-skeleton-dashboard
    [cards]="6"
    [showTable]="true"
    [showChart]="true">
  </lib-skeleton-dashboard>
</div>
