<div style="padding: 40px">
  <h1>Skeleton Table Test</h1>

  <lib-skeleton-table
    [rows]="6"
    [columns]="5">
  </lib-skeleton-table>
</div>

<div style="padding: 40px">
  <h1>Skeleton Card Test</h1>

  <lib-skeleton-card
    [showImage]="true"
    [lines]="4">
  </lib-skeleton-card>
</div>

<div style="padding: 40px">
  <h1>Skeleton Chart Test</h1>

  <lib-skeleton-chart
    [type]="'pie'"
    [height]="300"
    [bars]="10">
  </lib-skeleton-chart>
</div>
<div style="padding: 40px">
  <h1>Skeleton Chart Test</h1>

  <lib-skeleton-chart
    [type]="'line'"
    [height]="300"
    [bars]="10">
  </lib-skeleton-chart>
</div>
<div style="padding: 40px">
  <h1>Skeleton Chart Test</h1>

  <lib-skeleton-chart
    [type]="'bar'"
    [height]="300"
    [bars]="10">
  </lib-skeleton-chart>
</div>
